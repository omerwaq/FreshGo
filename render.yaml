services:
  - type: web
    name: freshgo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        value: freshgo_secret_123
      - key: ADMIN_FB_ID
        sync: false
      - key: BASE_URL
        sync: false
